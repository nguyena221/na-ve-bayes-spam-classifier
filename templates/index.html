<!DOCTYPE html>
<html>
<head>
    <title>Naive Bayes Spam Classifier</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <h1>Naive Bayes Spam Classifier</h1>

        <p>
            Type a message below, and the classifier will predict whether it is spam or ham.
        </p>

        <form method="POST">
            <textarea name="message" placeholder="Enter a message..." required>{{ message }}</textarea>
            <button type="submit">Classify Message</button>
        </form>

        {% if prediction %}
            <div class="result">
                <h2>Prediction: {{ prediction.upper() }}</h2>

                <p>Spam probability: {{ probabilities["spam"] }}%</p>
                <p>Ham probability: {{ probabilities["ham"] }}%</p>
            </div>
        {% endif %}
    </div>
</body>
</html>
